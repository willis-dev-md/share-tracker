<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hourly Stock Gainers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #34D399; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center py-10 px-4">
    <div class="w-full max-w-2xl">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-3xl font-bold text-green-400">Market Pulse</h1>
                <p class="text-gray-400">Real-time Python & Vercel Demo</p>
            </div>
            <div id="last-updated" class="text-xs text-gray-500 italic mb-1">Last checked: Never</div>
        </div>
        <div class="flex items-center gap-4 mb-4 bg-gray-800/50 p-3 rounded-lg border border-gray-700">
            <span class="text-sm font-semibold text-gray-400">Market:</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="market-toggle" class="sr-only peer">
                <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                <span id="market-label" class="ml-3 text-sm font-medium text-gray-300 font-mono uppercase tracking-widest">US (Global)</span>
            </label>
        </div>
        
        <div class="mt-6 flex gap-2">
            <input type="text" id="ticker-search" placeholder="Add Ticker (e.g. NFLX, VOD, london lse)" 
                   class="bg-gray-800 border border-gray-700 text-white px-4 py-2 rounded-lg focus:outline-none focus:border-green-500 flex-grow">
            <button onclick="addTicker()" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg font-bold transition">
                Add
            </button>
            <button onclick="clearCustomTickers()" class="bg-red-900/30 text-red-400 hover:bg-red-900/50 px-4 py-2 rounded-lg text-sm">
                Clear
            </button>
        </div>

        <div class="bg-gray-800 rounded-xl shadow-2xl overflow-hidden border border-gray-700">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-700/50 text-gray-300 uppercase text-xs tracking-wider">
                        <th class="p-4">Ticker</th>
                        <th class="p-4 text-right">Change (1hr)</th>
                    </tr>
                </thead>
                <tbody id="ticker-body"></tbody>
            </table>
            
            <div id="loading-state" class="p-12 flex flex-col items-center justify-center">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-600 h-12 w-12 mb-4"></div>
                <p class="text-gray-400 animate-pulse">Fetching latest prices...</p>
            </div>
        </div>
        
        <button onclick="fetchData()" class="mt-8 w-full sm:w-auto bg-green-600 hover:bg-green-500 text-white px-8 py-3 rounded-lg font-bold transition-all transform active:scale-95 shadow-lg">
            Refresh Now
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
